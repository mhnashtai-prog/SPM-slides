<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>INTUITY · Verb Slides</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   INTUITY DESIGN SYSTEM
═══════════════════════════════════════════ */
:root{
  --bg:          #0c0c0c;
  --surface:     #161616;
  --surf-raised: #1e1e1e;
  --border:      rgba(201,169,97,.13);
  --border-dim:  rgba(255,255,255,.05);
  --gold:        #C9A961;
  --gold-soft:   rgba(201,169,97,.18);
  --gold-glow:   rgba(201,169,97,.28);
  --ink:         #f0ede6;
  --ink-2:       rgba(240,237,230,.65);
  --ink-3:       rgba(240,237,230,.32);
  --mrs:         #e07b6a;   /* warm terracotta */
  --mr:          #6a94d8;   /* cool slate blue */
  --h: 58px;
  --f: 72px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;
  background:var(--bg);color:var(--ink);
  font-family:'Instrument Sans',sans-serif;
  -webkit-font-smoothing:antialiased}

/* ── ambient glow ── */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 40% at 10% 90%,rgba(201,169,97,.04) 0%,transparent 70%),
    radial-gradient(ellipse 45% 35% at 90% 10%,rgba(224,123,106,.04) 0%,transparent 70%);
}

/* ═══════════════════════════════════════════
   SHELL
═══════════════════════════════════════════ */
.shell{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.hdr{
  flex-shrink:0;height:var(--h);
  background:rgba(12,12,12,.97);
  border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;
  position:relative;z-index:100;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}

/* LOGO */
.hdr-logo{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;border-right:1px solid var(--border);
  flex-shrink:0;
}
.logo-word{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:16px;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);
}
.logo-pipe{width:1px;height:18px;background:var(--border)}
.logo-tag{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);
  white-space:nowrap;
}

/* TENSE ROW — centre */
.tense-row{
  flex:1;display:flex;align-items:stretch;justify-content:center;
}
.t-btn{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:1.8px;text-transform:uppercase;
  padding:0 24px;
  background:transparent;border:none;
  color:var(--ink-3);cursor:pointer;
  position:relative;transition:color .18s;
  border-right:1px solid var(--border-dim);
}
.t-btn:first-child{border-left:1px solid var(--border-dim)}
.t-btn:hover{color:var(--ink-2)}
.t-btn.on{color:var(--gold)}
.t-btn.on::after{
  content:'';position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:20px;height:2px;border-radius:1px;
  background:var(--gold);
  box-shadow:0 0 8px var(--gold-glow);
}

/* WATCH / READ toggle */
.hdr-mode{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;border-left:1px solid var(--border);
  flex-shrink:0;
}
.mode-label{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--ink-3);min-width:36px;text-align:right;
  transition:color .2s;
}
.mode-label.watch-on{color:var(--gold)}
.toggle{
  width:42px;height:22px;border-radius:11px;
  background:var(--surf-raised);
  border:1px solid var(--border);
  position:relative;cursor:pointer;
  transition:background .22s,border-color .22s;
  outline:none;flex-shrink:0;
}
.toggle.on{background:var(--gold-soft);border-color:var(--gold)}
.toggle-dot{
  position:absolute;top:3px;left:3px;
  width:14px;height:14px;border-radius:50%;
  background:var(--ink-3);
  transition:transform .22s cubic-bezier(.22,1,.36,1),background .22s;
}
.toggle.on .toggle-dot{transform:translateX(20px);background:var(--gold)}

/* ═══════════════════════════════════════════
   WATCH PROGRESS STRIP
═══════════════════════════════════════════ */
.progress-strip{
  position:fixed;top:var(--h);left:0;right:0;height:2px;z-index:200;
  background:transparent;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.progress-strip.on{opacity:1}
.progress-fill{
  height:100%;background:var(--gold);
  box-shadow:0 0 6px var(--gold-glow);
  width:0%;transition:width linear;
}

/* ═══════════════════════════════════════════
   STAGE
═══════════════════════════════════════════ */
.stage{
  flex:1;min-height:0;
  display:flex;align-items:center;justify-content:center;
  padding:16px 16px calc(var(--f) + 12px);
  position:relative;z-index:1;
}

/* ── FLIP CARD ── */
.card-shell{
  width:min(800px,97vw);
  height:min(490px,calc(100vh - var(--h) - var(--f) - 28px));
  position:relative;perspective:1800px;
}
.flip{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.22,1,.36,1);
  cursor:pointer;position:relative;
}
.flip.flipped{transform:rotateY(180deg)}

.face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.025) inset,
    0 32px 80px rgba(0,0,0,.65),
    0 4px 20px rgba(0,0,0,.4);
}
.face-back{transform:rotateY(180deg)}

/* colour ledge */
.ledge{height:3px;flex-shrink:0}

/* ── CARD TOP ROW ── */
.card-top{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px 10px;
  border-bottom:1px solid var(--border-dim);
}
.char-id{display:flex;align-items:center;gap:9px}
.char-em{font-size:clamp(15px,2.2vw,20px);line-height:1}
.char-name{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;
}
.char-name.mrs{color:var(--mrs)}
.char-name.mr {color:var(--mr)}

.card-right{display:flex;align-items:center;gap:10px}
.r-time{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:1.5px;color:var(--ink-3);
}
.r-verb{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:12px;letter-spacing:3px;text-transform:uppercase;
  padding:3px 9px;border-radius:3px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
}
.r-num{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:1px;color:var(--ink-3);
}

/* ── SENTENCE ── */
.sentence-zone{
  flex:1;min-height:0;
  display:flex;align-items:center;
  padding:18px 40px 12px;
}
@media(max-width:520px){.sentence-zone{padding:12px 22px 8px}}
.sentence{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(30px,5.2vw,64px);
  font-weight:600;line-height:1.22;
  letter-spacing:-.3px;
  color:var(--ink);width:100%;
}
/* highlighted verb — bold, coloured, no italic so it stays legible at poster scale */
.vw{
  font-weight:900;
  display:inline-block;
  position:relative;
}
.vw.bounce{animation:vbounce .42s ease-in-out infinite alternate}
@keyframes vbounce{
  from{transform:translateY(0) scale(1)}
  to  {transform:translateY(-6px) scale(1.05)}
}

/* ── CARD FOOTER ── */
.card-foot{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:10px 28px 16px;
  border-top:1px solid var(--border-dim);
}
.tense-pill{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--ink-3);padding:3px 10px;border-radius:20px;
  border:1px solid var(--border-dim);
}
.scene-lbl{
  font-family:'Instrument Sans',sans-serif;font-size:12px;
  font-style:italic;color:var(--ink-3);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  flex:1;
}
.spk-btn{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  cursor:pointer;font-size:18px;
  transition:background .15s,border-color .15s,transform .12s;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}
.spk-btn:hover{background:rgba(255,255,255,.12)}
.spk-btn:active{transform:scale(.9)}
.spk-btn.live{
  background:var(--gold);border-color:var(--gold);color:#0c0c0c;
  font-size:16px;
  animation:spkglow 1.1s ease-in-out infinite;
}
@keyframes spkglow{
  0%,100%{box-shadow:0 0 12px var(--gold-glow),0 2px 8px rgba(0,0,0,.35)}
  50%    {box-shadow:0 0 28px rgba(201,169,97,.5),0 2px 8px rgba(0,0,0,.35)}
}

/* card entrance */
@keyframes cardIn{
  from{opacity:0;transform:translateY(14px) scale(.97)}
  to  {opacity:1;transform:none}
}
.card-shell.enter .flip{animation:cardIn .36s cubic-bezier(.22,1,.36,1) both}

/* read-mode hint */
.hint{
  position:absolute;bottom:calc(var(--f) + 14px);left:50%;
  transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);
  pointer-events:none;white-space:nowrap;
  opacity:0;animation:hshow 4.5s ease 1.4s forwards;
}
@keyframes hshow{0%{opacity:0}15%{opacity:.7}80%{opacity:.7}100%{opacity:0}}

/* ═══════════════════════════════════════════
   FOOTER NAV
═══════════════════════════════════════════ */
.ftr{
  flex-shrink:0;height:var(--f);
  background:rgba(12,12,12,.98);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  gap:14px;padding:0 16px;
  z-index:100;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
.nav-btn{
  width:38px;height:38px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--border);
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  color:var(--ink-3);cursor:pointer;transition:all .16s;
}
.nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px var(--gold-glow)}
.nav-btn:disabled{opacity:.16;cursor:default}

.dots{
  display:flex;gap:4px;align-items:center;
  flex-wrap:wrap;justify-content:center;
  max-width:calc(100vw - 160px);overflow:hidden;
}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.1);
  border:none;cursor:pointer;padding:0;flex-shrink:0;
  transition:all .22s cubic-bezier(.22,1,.36,1);
}
.dot.cur{width:16px;border-radius:3px;background:var(--gold);box-shadow:0 0 7px var(--gold-glow)}
.dot.done{background:rgba(201,169,97,.3)}

.ctr{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:1.5px;color:var(--ink-3);
  min-width:44px;text-align:center;flex-shrink:0;
}

/* ═══════════════════════════════════════════
   COMPLETE OVERLAY
═══════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(8,8,8,.93);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;opacity:0;pointer-events:none;transition:opacity .4s;
}
.overlay.show{opacity:1;pointer-events:all}
.ov-em{font-size:52px;margin-bottom:4px}
.ov-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(36px,8vw,68px);letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
}
.ov-sub{
  font-family:'Instrument Sans',sans-serif;font-size:15px;
  color:var(--ink-2);text-align:center;
  max-width:320px;line-height:1.65;
}
.ov-btns{display:flex;gap:10px;margin-top:10px}
.ov-btn{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:15px;letter-spacing:2px;text-transform:uppercase;
  padding:12px 30px;border-radius:6px;cursor:pointer;
  transition:all .16s;
}
.ov-btn.primary{
  background:var(--gold);color:#0c0c0c;
  border:2px solid var(--gold);
  box-shadow:0 0 20px var(--gold-glow);
}
.ov-btn.primary:hover{background:#b8943a;border-color:#b8943a}
.ov-btn.ghost{
  background:transparent;color:var(--ink-2);
  border:2px solid var(--border);
}
.ov-btn.ghost:hover{border-color:var(--ink-2);color:var(--ink)}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:600px){
  .logo-pipe,.logo-tag{display:none}
  .t-btn{padding:0 13px;font-size:9px;letter-spacing:1px}
  .hdr-mode{padding:0 12px}
  .scene-lbl{display:none}
  .r-time{display:none}
}
@media(max-width:400px){
  .t-btn{padding:0 8px}
  .mode-label{display:none}
}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-logo">
      <span class="logo-word">INTUITY</span>
      <div class="logo-pipe"></div>
      <span class="logo-tag">Verb Slides</span>
    </div>

    <nav class="tense-row">
      <button class="t-btn on"  data-t="present" onclick="setTense('present')">Present</button>
      <button class="t-btn"     data-t="past"    onclick="setTense('past')">Past</button>
      <button class="t-btn"     data-t="future"  onclick="setTense('future')">Future</button>
      <button class="t-btn"     data-t="perfect" onclick="setTense('perfect')">Perfect</button>
    </nav>

    <div class="hdr-mode">
      <span class="mode-label" id="modeLbl">READ</span>
      <button class="toggle" id="modeBtn" onclick="toggleWatch()" aria-label="Toggle mode">
        <div class="toggle-dot"></div>
      </button>
    </div>
  </header>

  <!-- PROGRESS STRIP -->
  <div class="progress-strip" id="pStrip">
    <div class="progress-fill" id="pFill"></div>
  </div>

  <!-- STAGE -->
  <main class="stage">
    <div class="card-shell" id="cardShell">
      <div class="flip" id="flipCard" onclick="handleFlip()">

        <!-- FRONT: Mrs Bubbly -->
        <div class="face face-front" id="frontFace">
          <div class="ledge" id="ledgeF"></div>
          <div class="card-top">
            <div class="char-id">
              <span class="char-em">🌸</span>
              <span class="char-name mrs">Mrs Bubbly</span>
            </div>
            <div class="card-right">
              <span class="r-time"  id="fTime"></span>
              <span class="r-verb"  id="fVerb" style="color:var(--mrs)"></span>
              <span class="r-num"   id="fNum"></span>
            </div>
          </div>
          <div class="sentence-zone">
            <div class="sentence" id="fSent"></div>
          </div>
          <div class="card-foot">
            <span class="tense-pill" id="fPill">Present Simple</span>
            <span class="scene-lbl"  id="fScene"></span>
            <button class="spk-btn" id="fSpk" onclick="event.stopPropagation();speak('front')" title="Listen">🔊</button>
          </div>
        </div>

        <!-- BACK: Mr Bubbly -->
        <div class="face face-back" id="backFace">
          <div class="ledge" style="background:var(--mr)"></div>
          <div class="card-top">
            <div class="char-id">
              <span class="char-em">🌧️</span>
              <span class="char-name mr">Mr Bubbly</span>
            </div>
            <div class="card-right">
              <span class="r-time" id="bTime"></span>
              <span class="r-verb" id="bVerb" style="color:var(--mr)"></span>
              <span class="r-num"  id="bNum"></span>
            </div>
          </div>
          <div class="sentence-zone">
            <div class="sentence" id="bSent"></div>
          </div>
          <div class="card-foot">
            <span class="tense-pill" id="bPill">Present Simple</span>
            <span class="scene-lbl"  id="bScene"></span>
            <button class="spk-btn" id="bSpk" onclick="event.stopPropagation();speak('back')" title="Listen">🔊</button>
          </div>
        </div>

      </div><!-- /flip -->
    </div><!-- /card-shell -->
    <div class="hint" id="hint">tap to flip · meet Mr Bubbly</div>
  </main>

  <!-- FOOTER -->
  <footer class="ftr">
    <button class="nav-btn" id="btnP" onclick="prev()" disabled>‹</button>
    <span   class="ctr"    id="ctr">1 / 60</span>
    <div class="dots" id="dotsRow"></div>
    <button class="nav-btn" id="btnN" onclick="next()">›</button>
  </footer>

</div><!-- /shell -->

<!-- COMPLETE OVERLAY -->
<div class="overlay" id="overlay">
  <div class="ov-em">🌸</div>
  <div class="ov-title">Wonderful!</div>
  <div class="ov-sub">All 60 verbs — a whole day with the Bubblys. Well done.</div>
  <div class="ov-btns">
    <button class="ov-btn primary" onclick="restartWatch()">▶ Watch Again</button>
    <button class="ov-btn ghost"   onclick="closeOverlay()">Read Mode</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let V=[], cur=0, tense='present';
let watchMode=false, flipped=false, isSpeaking=false;
let watchTimer=null;

const LABELS={
  present:'Present Simple',
  past:'Past Simple',
  future:'Future · will',
  perfect:'Present Perfect'
};

/* ═══════════════════════════════════════════
   SPEECH
═══════════════════════════════════════════ */
let ukVoice=null;
function loadVoice(){
  const all=speechSynthesis.getVoices();
  const want=['Google UK English Female','Google UK English Male','Daniel','Serena','Kate'];
  for(const n of want){
    const v=all.find(v=>v.name.includes(n));
    if(v){ukVoice=v;return}
  }
  ukVoice=all.find(v=>v.lang&&v.lang.startsWith('en-GB'))
        ||all.find(v=>v.lang&&v.lang.startsWith('en'))||null;
}
speechSynthesis.onvoiceschanged=loadVoice;loadVoice();

function stopSpeech(){
  speechSynthesis.cancel();
  isSpeaking=false;
  currentSide=null;
  ['fSpk','bSpk'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){b.classList.remove('live');b.textContent='🔊'}
  });
  document.querySelectorAll('.vw').forEach(el=>el.classList.remove('bounce'));
}

function speakText(text,btnId,sentId){
  stopSpeech();
  if(!text)return;
  document.querySelectorAll('#'+sentId+' .vw').forEach(el=>el.classList.add('bounce'));
  const btn=document.getElementById(btnId);
  btn.classList.add('live');btn.textContent='⏸';
  isSpeaking=true;
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.72;u.pitch=1.06;u.volume=1;
  if(ukVoice)u.voice=ukVoice;
  u.onend=u.onerror=()=>{
    btn.classList.remove('live');btn.textContent='🔊';
    isSpeaking=false;
    currentSide=null;
    document.querySelectorAll('.vw').forEach(el=>el.classList.remove('bounce'));
    if(watchMode)watchAfterSpeech();
  };
  speechSynthesis.speak(u);
}

let currentSide=null; // tracks which side is currently speaking

function speak(side){
  const v=V[cur];if(!v)return;
  /* If already speaking THIS side → stop (toggle off) */
  if(isSpeaking && currentSide===side){stopSpeech();return}
  /* Otherwise stop whatever is playing and start this side */
  stopSpeech();
  currentSide=side;
  if(side==='front') speakText(v.tenses[tense].mrs,'fSpk','fSent');
  else               speakText(v.tenses[tense].mr, 'bSpk','bSent');
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function reEsc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

/* ── Irregular verb map (base → [past, past participle]) ── */
const IRREG={
  wake:['woke','woken'],
  get:['got','got','gotten'],
  have:['had','had'],
  make:['made','made'],
  eat:['ate','eaten'],
  check:['checked','checked'],
  walk:['walked','walked'],
  catch:['caught','caught'],
  run:['ran','run'],
  meet:['met','met'],
  grab:['grabbed','grabbed'],
  drop:['dropped','dropped'],
  sort:['sorted','sorted'],
  tidy:['tidied','tidied'],
  cook:['cooked','cooked'],
  deal:['dealt','dealt'],
  look:['looked','looked'],
  pick:['picked','picked'],
  sit:['sat','sat'],
  water:['watered','watered'],
  fix:['fixed','fixed'],
  bring:['brought','brought'],
  listen:['listened','listened'],
  prepare:['prepared','prepared'],
  set:['set','set'],
  arrive:['arrived','arrived'],
  pour:['poured','poured'],
  tell:['told','told'],
  laugh:['laughed','laughed'],
  send:['sent','sent'],
  fill:['filled','filled'],
  read:['read','read'],
  think:['thought','thought'],
  fall:['fell','fallen'],
  sleep:['slept','slept'],
  dream:['dreamed','dreamed','dreamt'],
  share:['shared','shared'],
  keep:['kept','kept'],
  give:['gave','given'],
  remember:['remembered','remembered'],
  forget:['forgot','forgotten'],
  love:['loved','loved'],
  live:['lived','lived'],
  carry:['carried','carried'],
  come:['came','come'],
  turn:['turned','turned']
};

function inflections(verb){
  /* Returns every form we want to highlight for this verb */
  const v=verb.toLowerCase().trim();
  const forms=new Set();

  /* If multi-word (e.g. "get up", "sort out"), collect all words */
  const words=v.split(/\s+/);
  const base=words[0];
  const particle=words.slice(1).join(' '); // "up", "out", "after", etc.

  function addForms(b){
    forms.add(b);
    // regular inflections
    if(b.endsWith('e')){
      forms.add(b+'s');forms.add(b+'d');forms.add(b.slice(0,-1)+'ing');
    } else if(b.endsWith('y')&&!/[aeiou]y$/.test(b)){
      forms.add(b.slice(0,-1)+'ies');forms.add(b.slice(0,-1)+'ied');forms.add(b+'ing');
    } else {
      forms.add(b+'s');forms.add(b+'ed');forms.add(b+'ing');
      // double consonant
      const m=b.match(/[aeiou]([bcdfghjklmnpqrstvwxyz])$/);
      if(m){forms.add(b+m[1]+'ed');forms.add(b+m[1]+'ing')}
    }
    // irregular
    const irr=IRREG[b];
    if(irr)irr.forEach(f=>forms.add(f));
  }

  addForms(base);

  /* Build final array: include particle where needed */
  const result=[];
  forms.forEach(f=>{
    if(particle){
      /* multi-word: match "gets up", "got up", "getting up", "sort out", etc. */
      result.push(f+'\\s+'+reEsc(particle));
    } else {
      result.push(reEsc(f));
    }
  });

  /* Also add "will + base[+particle]" and "has/have/had + pp[+particle]" */
  const pp=(IRREG[base]&&IRREG[base][1])||base+'ed';
  if(particle){
    result.push('will\\s+'+reEsc(base)+'\\s+'+reEsc(particle));
    result.push('(?:has|have|had)\\s+'+reEsc(pp)+'\\s+'+reEsc(particle));
    result.push('never\\s+'+reEsc(base)+'\\s+'+reEsc(particle));
    result.push('never\\s+'+reEsc(pp)+'\\s+'+reEsc(particle));
    result.push('always\\s+'+reEsc(base)+'\\s+'+reEsc(particle));
  } else {
    result.push('will\\s+'+reEsc(base));
    result.push('(?:has|have|had)\\s+'+reEsc(pp));
    result.push('never\\s+'+reEsc(base));
    result.push('never\\s+'+reEsc(pp));
    result.push('always\\s+'+reEsc(base));
  }

  /* sort longest first so greedy match picks multi-word before single */
  result.sort((a,b)=>b.length-a.length);
  return result;
}

function markVerb(sentence,verb,col){
  let s=esc(sentence);
  const pats=inflections(verb);
  /* join into one alternation */
  const combined='(?<![\\w])('+pats.join('|')+')(?![\\w-])';
  try{
    const rx=new RegExp(combined,'gi');
    s=s.replace(rx,`<span class="vw" style="color:${col}">$1</span>`);
  }catch(e){
    /* fallback: try each pattern individually */
    for(const p of pats){
      try{
        const rx=new RegExp('(?<![\\w])('+p+')(?![\\w-])','gi');
        s=s.replace(rx,`<span class="vw" style="color:${col}">$1</span>`);
      }catch(_){}
    }
  }
  return s;
}

function render(){
  const v=V[cur];if(!v)return;
  const d=v.tenses[tense];
  const tot=V.length;
  const num=(cur+1)+' / '+tot;
  const lbl=LABELS[tense];

  // Front
  document.getElementById('ledgeF').style.background='var(--mrs)';
  document.getElementById('fTime').textContent=v.time||'';
  document.getElementById('fVerb').textContent=v.verb.toUpperCase();
  document.getElementById('fNum').textContent=num;
  document.getElementById('fPill').textContent=lbl;
  document.getElementById('fScene').textContent=v.scene||'';
  document.getElementById('fSpk').classList.remove('live');
  document.getElementById('fSpk').textContent='🔊';
  document.getElementById('fSent').innerHTML=markVerb(d.mrs,v.verb,'var(--mrs)');

  // Back
  document.getElementById('bTime').textContent=v.time||'';
  document.getElementById('bVerb').textContent=v.verb.toUpperCase();
  document.getElementById('bNum').textContent=num;
  document.getElementById('bPill').textContent=lbl;
  document.getElementById('bScene').textContent=v.scene||'';
  document.getElementById('bSpk').classList.remove('live');
  document.getElementById('bSpk').textContent='🔊';
  document.getElementById('bSent').innerHTML=markVerb(d.mr,v.verb,'var(--mr)');

  // dots + nav
  renderDots();
  document.getElementById('ctr').textContent=num;
  document.getElementById('btnP').disabled=cur<=0;
  document.getElementById('btnN').disabled=cur>=V.length-1;
}

function renderDots(){
  const row=document.getElementById('dotsRow');row.innerHTML='';
  V.forEach((_,i)=>{
    const d=document.createElement('button');
    d.className='dot'+(i===cur?' cur':i<cur?' done':'');
    d.title=V[i].verb;
    d.onclick=e=>{e.stopPropagation();goTo(i)};
    row.appendChild(d);
  });
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function goTo(i){
  if(i<0||i>=V.length)return;
  stopSpeech();clearWT();
  unflip();cur=i;
  enterAnim();render();
  if(watchMode)watchStart();
}
function next(){if(cur<V.length-1)goTo(cur+1);else if(watchMode)showComplete()}
function prev(){if(cur>0)goTo(cur-1)}

function enterAnim(){
  const s=document.getElementById('cardShell');
  s.classList.remove('enter');void s.offsetWidth;
  s.classList.add('enter');
  setTimeout(()=>s.classList.remove('enter'),400);
}

function unflip(){
  flipped=false;
  document.getElementById('flipCard').classList.remove('flipped');
}

/* ═══════════════════════════════════════════
   FLIP (READ only)
═══════════════════════════════════════════ */
function handleFlip(){
  if(watchMode)return;
  stopSpeech();
  flipped=!flipped;
  document.getElementById('flipCard').classList.toggle('flipped',flipped);
}

/* ═══════════════════════════════════════════
   TENSE
═══════════════════════════════════════════ */
function setTense(t){
  tense=t;stopSpeech();clearWT();
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  render();
  if(watchMode)watchStart();
}

/* ═══════════════════════════════════════════
   WATCH MODE
═══════════════════════════════════════════ */
function toggleWatch(){
  watchMode=!watchMode;
  const btn=document.getElementById('modeBtn');
  const lbl=document.getElementById('modeLbl');
  const ps =document.getElementById('pStrip');
  const ht =document.getElementById('hint');
  btn.classList.toggle('on',watchMode);
  lbl.textContent=watchMode?'WATCH':'READ';
  lbl.classList.toggle('watch-on',watchMode);
  ps.classList.toggle('on',watchMode);
  ht.style.display=watchMode?'none':'';
  stopSpeech();clearWT();
  if(watchMode){unflip();watchStart()}
}

/* Watch flow: speak Mrs → pause 1.8s → flip → speak Mr → pause 2.2s → advance */
function watchStart(){
  if(!watchMode)return;
  unflip();
  const v=V[cur];if(!v)return;
  currentSide='front';
  speakText(v.tenses[tense].mrs,'fSpk','fSent');
  // continuation handled by watchAfterSpeech
}

function watchAfterSpeech(){
  if(!watchMode)return;
  clearWT();
  if(!flipped){
    // Mrs just finished — pause then flip to Mr
    watchTimer=setTimeout(()=>{
      if(!watchMode)return;
      flipped=true;
      document.getElementById('flipCard').classList.add('flipped');
      watchTimer=setTimeout(()=>{
        if(!watchMode)return;
        const v=V[cur];if(!v)return;
        currentSide='back';
        speakText(v.tenses[tense].mr,'bSpk','bSent');
      },550);
    },1800);
  } else {
    // Mr just finished — pause then advance
    watchTimer=setTimeout(()=>{
      if(!watchMode)return;
      if(cur<V.length-1){next()}else showComplete();
    },2200);
  }
}

function clearWT(){if(watchTimer){clearTimeout(watchTimer);watchTimer=null}}

function showComplete(){
  clearWT();stopSpeech();
  document.getElementById('overlay').classList.add('show');
}
function restartWatch(){
  document.getElementById('overlay').classList.remove('show');
  cur=0;unflip();enterAnim();render();
  setTimeout(()=>{if(watchMode)watchStart()},400);
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  watchMode=false;
  document.getElementById('modeBtn').classList.remove('on');
  document.getElementById('modeLbl').textContent='READ';
  document.getElementById('modeLbl').classList.remove('watch-on');
  document.getElementById('pStrip').classList.remove('on');
  document.getElementById('hint').style.display='';
}

/* ═══════════════════════════════════════════
   KEYBOARD + SWIPE
═══════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();if(!watchMode)handleFlip()}
  else if(e.key==='Escape'){stopSpeech();closeOverlay()}
});

let _tx=0,_ty=0;
document.addEventListener('touchstart',e=>{_tx=e.changedTouches[0].screenX;_ty=e.changedTouches[0].screenY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].screenX-_tx;
  const dy=e.changedTouches[0].screenY-_ty;
  if(Math.abs(dy)>Math.abs(dx))return;
  if(dx<-60)next();
  else if(dx>60)prev();
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
async function init(){
  try{
    const r=await fetch('./verbs-data.json');
    const d=await r.json();
    V=d.verbs;
  }catch(e){V=[]}
  render();
}
init();
</script>
